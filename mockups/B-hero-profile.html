<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XHub Detail Panel — Vorschlag B: Hero Profile</title>
<style>
  :root {
    --window-bg: #262B34;
    --panel-bg: #313846;
    --card-bg: #3C4556;
    --card-hover: #485365;
    --primary-text: #F5F7FA;
    --secondary-text: #CCD4E0;
    --subtle-text: #9CA7B8;
    --border: #59647A;
    --accent: #8EA9CE;
    --accent-hover: #A4BDE0;
    --accent-pressed: #7996BA;
    --accent-subtle: #3D4F6B;
    --soft-surface: #4A5260;
    --success: #34D399;
    --warning: #FBBF24;
    --error: #F87171;
    --info: #60A5FA;
    --hero-gradient-from: #3D4F6B;
    --hero-gradient-to: #313846;
    --schedule-cell-bg: var(--card-bg);
    --schedule-header-bg: #3A4255;
    --schedule-lunch: rgba(255,255,255,0.04);
    --schedule-primary: #F5F7FA;
    --schedule-ext-fg: #6EE7B7;
    --schedule-ext-bg: rgba(52,211,153,0.12);
    --schedule-disp-fg: #FCA5A5;
    --schedule-disp-bg: rgba(248,113,113,0.12);
    --photo-bg: #4A5260;
    --tag-bg: rgba(142,169,206,0.18);
    --tag-text: #A4BDE0;
    --chip-bg: var(--card-bg);
    --chip-border: var(--border);
  }

  :root.light {
    --window-bg: #F4F6F8;
    --panel-bg: #FFFFFF;
    --card-bg: #F8FAFC;
    --card-hover: #EEF2F6;
    --primary-text: #1A1D22;
    --secondary-text: #646B76;
    --subtle-text: #8B94A3;
    --border: #D5DCE5;
    --accent: #7394BD;
    --accent-hover: #89A8CE;
    --accent-pressed: #6486B0;
    --accent-subtle: #E3EBF5;
    --soft-surface: #EDF1F5;
    --hero-gradient-from: #DAE3EF;
    --hero-gradient-to: #FFFFFF;
    --schedule-cell-bg: #FFFFFF;
    --schedule-header-bg: #F0F3F7;
    --schedule-lunch: rgba(0,0,0,0.03);
    --schedule-primary: #1A1D22;
    --schedule-ext-fg: #059669;
    --schedule-ext-bg: rgba(5,150,105,0.08);
    --schedule-disp-fg: #DC2626;
    --schedule-disp-bg: rgba(220,38,38,0.08);
    --photo-bg: #E2E8F0;
    --tag-bg: rgba(115,148,189,0.12);
    --tag-text: #5A7DA8;
    --chip-bg: #F0F3F7;
    --chip-border: #D5DCE5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--window-bg);
    color: var(--primary-text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
    transition: background .25s, color .25s;
  }

  .detail-panel {
    width: 340px;
    min-height: 600px;
    background: var(--panel-bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background .25s, border-color .25s;
  }

  .theme-toggle {
    position: fixed; top: 16px; right: 16px;
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--primary-text); padding: 8px 14px;
    border-radius: 8px; cursor: pointer; font-size: 13px;
    font-family: inherit; transition: all .2s; z-index: 100;
  }
  .theme-toggle:hover { background: var(--card-hover); }

  /* ─── HERO AREA ─── */
  .hero {
    background: linear-gradient(135deg, var(--hero-gradient-from), var(--hero-gradient-to));
    padding: 28px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    transition: background .25s;
  }

  .avatar-ring {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent-pressed));
    margin-bottom: 14px;
  }
  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--photo-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--panel-bg);
    transition: background .25s, border-color .25s;
  }
  .avatar svg {
    width: 36px; height: 36px;
    color: var(--subtle-text); opacity: 0.5;
  }

  .hero .name {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .hero .meta-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 600;
  }
  .badge.initials {
    background: var(--tag-bg);
    color: var(--tag-text);
    letter-spacing: 0.06em;
  }
  .badge.status {
    background: rgba(52,211,153,0.15);
    color: var(--success);
  }
  .badge.counselor {
    background: transparent;
    color: var(--subtle-text);
    font-weight: 500;
    padding: 3px 0;
  }
  .badge.counselor strong { color: var(--accent); font-weight: 600; }

  /* ─── ACTION CHIPS (horizontal scroll) ─── */
  .chip-strip {
    padding: 14px 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 12px;
    background: var(--chip-bg);
    border: 1px solid var(--chip-border);
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--secondary-text);
    transition: all .15s;
    white-space: nowrap;
  }
  .chip:hover {
    background: var(--card-hover);
    color: var(--primary-text);
    border-color: var(--accent);
  }
  .chip .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* ─── ODOO (full-width inline) ─── */
  .odoo-row {
    padding: 0 20px 14px;
  }
  .odoo-btn {
    width: 100%;
    padding: 10px 0;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .odoo-btn:hover {
    background: var(--accent);
    color: var(--panel-bg);
  }

  /* ─── DIVIDER ─── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 20px;
    opacity: 0.4;
  }

  /* ─── SCHEDULE ─── */
  .schedule-section {
    padding: 14px 20px 20px;
  }
  .schedule-section .section-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--subtle-text);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .schedule-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 2px;
  }
  .schedule-table th {
    padding: 5px 0;
    font-size: 11px;
    font-weight: 600;
    color: var(--secondary-text);
    background: var(--schedule-header-bg);
    border-radius: 6px 6px 0 0;
    transition: background .25s;
  }
  .schedule-table td {
    background: var(--schedule-cell-bg);
    text-align: center;
    vertical-align: middle;
    padding: 5px 2px;
    min-height: 44px;
    height: 44px;
    border-radius: 4px;
    transition: background .25s;
  }
  .schedule-table .lunch-row td {
    background: var(--schedule-lunch);
    height: 4px;
    padding: 0;
    border-radius: 0;
  }

  .cell-group {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--schedule-primary);
    display: block;
    line-height: 1.2;
  }
  .cell-sub {
    font-size: 8px;
    color: var(--secondary-text);
    display: block;
    margin-top: 1px;
  }
  .cell-empty {
    font-size: 11px;
    color: var(--subtle-text);
    opacity: 0.4;
  }
  .cell-status {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
  }
  .cell-status.ext { color: var(--schedule-ext-fg); background: var(--schedule-ext-bg); }
  .cell-status.disp { color: var(--schedule-disp-fg); background: var(--schedule-disp-bg); }
  .cell-daz {
    font-size: 7.5px;
    color: var(--accent);
    font-weight: 500;
    display: block;
  }

  .design-label {
    position: fixed; top: 16px; left: 16px;
    font-size: 11px; color: var(--subtle-text);
    background: var(--card-bg); padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="design-label">Vorschlag B — Hero Profile</div>
  <button class="theme-toggle" onclick="toggle()">Theme wechseln</button>

  <div class="detail-panel">

    <!-- ── HERO ── -->
    <div class="hero">
      <div class="avatar-ring">
        <div class="avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 0116.5 0" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="name">Jan Müller</div>
      <div class="meta-row">
        <span class="badge initials">JMU</span>
        <span class="badge status">Aktiv</span>
      </div>
      <div class="meta-row" style="margin-top:6px">
        <span class="badge counselor">Beratung: <strong>KS</strong></span>
      </div>
    </div>

    <!-- ── ACTION CHIPS ── -->
    <div class="chip-strip">
      <button class="chip"><span class="dot"></span>Ordner</button>
      <button class="chip"><span class="dot"></span>Akte</button>
      <button class="chip">BU</button>
      <button class="chip">BI</button>
      <button class="chip">BE</button>
      <button class="chip">LB</button>
      <button class="chip">E BU</button>
      <button class="chip">E BI</button>
    </div>

    <!-- ── ODOO ── -->
    <div class="odoo-row">
      <button class="odoo-btn">Odoo offnen</button>
    </div>

    <div class="divider"></div>

    <!-- ── SCHEDULE ── -->
    <div class="schedule-section">
      <div class="section-label">Wochenplan</div>
      <table class="schedule-table">
        <thead>
          <tr>
            <th>Mo</th>
            <th>Di</th>
            <th>Mi</th>
            <th>Do</th>
            <th>Fr</th>
          </tr>
        </thead>
        <tbody>
          <!-- VM -->
          <tr>
            <td>
              <span class="cell-group">BI</span>
              <span class="cell-sub">HM · 203</span>
            </td>
            <td>
              <span class="cell-group">MO</span>
              <span class="cell-sub">KS · 105</span>
            </td>
            <td>
              <span class="cell-group">DAZ</span>
              <span class="cell-daz">+DAZ</span>
            </td>
            <td>
              <span class="cell-status ext">ext</span>
            </td>
            <td>
              <span class="cell-group">BE</span>
              <span class="cell-sub">FL · W01</span>
            </td>
          </tr>
          <!-- lunch -->
          <tr class="lunch-row">
            <td colspan="5"></td>
          </tr>
          <!-- NM -->
          <tr>
            <td><span class="cell-empty">-</span></td>
            <td>
              <span class="cell-group">BU</span>
              <span class="cell-sub">RS · 107</span>
            </td>
            <td><span class="cell-empty">-</span></td>
            <td>
              <span class="cell-group">LB</span>
              <span class="cell-sub">AP · 210</span>
            </td>
            <td>
              <span class="cell-status disp">disp</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

<script>
function toggle() {
  document.documentElement.classList.toggle('light');
}
</script>
</body>
</html>
