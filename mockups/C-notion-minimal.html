<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XHub Detail Panel — Vorschlag C: Notion Minimal</title>
<style>
  :root {
    --window-bg: #262B34;
    --panel-bg: #313846;
    --card-bg: #3C4556;
    --card-hover: #485365;
    --primary-text: #F5F7FA;
    --secondary-text: #CCD4E0;
    --subtle-text: #9CA7B8;
    --border: #59647A;
    --accent: #8EA9CE;
    --accent-hover: #A4BDE0;
    --accent-pressed: #7996BA;
    --accent-subtle: #3D4F6B;
    --soft-surface: #4A5260;
    --success: #34D399;
    --warning: #FBBF24;
    --error: #F87171;
    --info: #60A5FA;
    --row-hover: rgba(142,169,206,0.06);
    --schedule-cell-bg: transparent;
    --schedule-active-bg: rgba(142,169,206,0.08);
    --schedule-primary: #F5F7FA;
    --schedule-ext-fg: #6EE7B7;
    --schedule-ext-bg: rgba(52,211,153,0.12);
    --schedule-disp-fg: #FCA5A5;
    --schedule-disp-bg: rgba(248,113,113,0.12);
    --photo-bg: #4A5260;
    --tag-bg: rgba(142,169,206,0.15);
    --tag-text: #A4BDE0;
    --prop-label: #9CA7B8;
    --prop-value: #CCD4E0;
  }

  :root.light {
    --window-bg: #F4F6F8;
    --panel-bg: #FFFFFF;
    --card-bg: #F8FAFC;
    --card-hover: #EEF2F6;
    --primary-text: #1A1D22;
    --secondary-text: #646B76;
    --subtle-text: #8B94A3;
    --border: #D5DCE5;
    --accent: #7394BD;
    --accent-hover: #89A8CE;
    --accent-pressed: #6486B0;
    --accent-subtle: #E3EBF5;
    --soft-surface: #EDF1F5;
    --row-hover: rgba(115,148,189,0.06);
    --schedule-cell-bg: transparent;
    --schedule-active-bg: rgba(115,148,189,0.06);
    --schedule-primary: #1A1D22;
    --schedule-ext-fg: #059669;
    --schedule-ext-bg: rgba(5,150,105,0.08);
    --schedule-disp-fg: #DC2626;
    --schedule-disp-bg: rgba(220,38,38,0.08);
    --photo-bg: #E2E8F0;
    --tag-bg: rgba(115,148,189,0.12);
    --tag-text: #5A7DA8;
    --prop-label: #8B94A3;
    --prop-value: #4A5260;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--window-bg);
    color: var(--primary-text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
    transition: background .25s, color .25s;
  }

  .detail-panel {
    width: 340px;
    min-height: 600px;
    background: var(--panel-bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background .25s, border-color .25s;
  }

  .theme-toggle {
    position: fixed; top: 16px; right: 16px;
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--primary-text); padding: 8px 14px;
    border-radius: 8px; cursor: pointer; font-size: 13px;
    font-family: inherit; transition: all .2s; z-index: 100;
  }
  .theme-toggle:hover { background: var(--card-hover); }

  /* ─── NOTION-STYLE HEADER ─── */
  .notion-header {
    padding: 28px 24px 0;
  }

  .avatar-small {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--photo-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    transition: background .25s;
  }
  .avatar-small svg {
    width: 22px; height: 22px;
    color: var(--subtle-text); opacity: 0.5;
  }

  .notion-header .name {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.025em;
    margin-bottom: 4px;
  }

  /* ─── NOTION PROPERTY TABLE ─── */
  .props {
    padding: 16px 24px 8px;
  }

  .prop-row {
    display: flex;
    align-items: center;
    padding: 7px 0;
    border-radius: 4px;
    transition: background .1s;
  }
  .prop-row:hover {
    background: var(--row-hover);
    margin: 0 -6px;
    padding: 7px 6px;
  }

  .prop-label {
    width: 110px;
    flex-shrink: 0;
    font-size: 12.5px;
    color: var(--prop-label);
    font-weight: 400;
  }
  .prop-value {
    flex: 1;
    font-size: 13px;
    color: var(--prop-value);
    font-weight: 500;
    min-width: 0;
  }

  .inline-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
  }
  .inline-badge.accent {
    background: var(--tag-bg);
    color: var(--tag-text);
    letter-spacing: 0.04em;
  }
  .inline-badge.status {
    background: rgba(52,211,153,0.12);
    color: var(--success);
  }

  .prop-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
    font-size: 13px;
  }
  .prop-link:hover { text-decoration: underline; }

  /* ─── SEPARATOR ─── */
  .sep {
    height: 1px;
    background: var(--border);
    margin: 8px 24px;
    opacity: 0.35;
  }

  /* ─── ACTION LIST (Notion-style rows) ─── */
  .action-section {
    padding: 6px 18px;
  }
  .action-section .section-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--subtle-text);
    font-weight: 600;
    padding: 0 6px;
    margin-bottom: 4px;
  }

  .action-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .12s;
    border: none;
    background: transparent;
    width: 100%;
    font-family: inherit;
    color: var(--primary-text);
    text-align: left;
  }
  .action-row:hover { background: var(--row-hover); }

  .action-icon {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--accent-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    transition: background .25s;
  }

  .action-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--secondary-text);
  }

  .action-arrow {
    margin-left: auto;
    font-size: 14px;
    color: var(--subtle-text);
    opacity: 0;
    transition: opacity .12s;
  }
  .action-row:hover .action-arrow { opacity: 0.6; }

  /* ─── SCHEDULE ─── */
  .schedule-section {
    padding: 6px 24px 24px;
  }
  .schedule-section .section-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--subtle-text);
    font-weight: 600;
    margin-bottom: 10px;
  }

  /* Dot-matrix style schedule */
  .schedule-matrix {
    width: 100%;
  }
  .schedule-matrix .row {
    display: flex;
    gap: 3px;
    margin-bottom: 3px;
  }
  .schedule-matrix .day-label {
    width: 28px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--secondary-text);
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .schedule-matrix .halfday {
    flex: 1;
    background: var(--schedule-cell-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 6px;
    min-height: 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    transition: background .25s, border-color .25s;
  }
  .schedule-matrix .halfday.has-content {
    background: var(--schedule-active-bg);
    border-color: transparent;
  }
  .schedule-matrix .halfday-label {
    font-size: 7.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--subtle-text);
    margin-bottom: 2px;
  }

  .cell-group { font-size: 11px; font-weight: 600; color: var(--schedule-primary); line-height: 1.1; }
  .cell-sub { font-size: 8px; color: var(--secondary-text); }
  .cell-empty { font-size: 11px; color: var(--subtle-text); opacity: 0.3; }
  .cell-status { font-size: 8.5px; font-weight: 600; padding: 1px 5px; border-radius: 3px; }
  .cell-status.ext { color: var(--schedule-ext-fg); background: var(--schedule-ext-bg); }
  .cell-status.disp { color: var(--schedule-disp-fg); background: var(--schedule-disp-bg); }
  .cell-daz { font-size: 7px; color: var(--accent); font-weight: 500; }

  .design-label {
    position: fixed; top: 16px; left: 16px;
    font-size: 11px; color: var(--subtle-text);
    background: var(--card-bg); padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="design-label">Vorschlag C — Notion Minimal</div>
  <button class="theme-toggle" onclick="toggle()">Theme wechseln</button>

  <div class="detail-panel">

    <!-- ── HEADER ── -->
    <div class="notion-header">
      <div class="avatar-small">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 0116.5 0" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="name">Jan Müller</div>
    </div>

    <!-- ── PROPERTIES ── -->
    <div class="props">
      <div class="prop-row">
        <div class="prop-label">Kürzel</div>
        <div class="prop-value"><span class="inline-badge accent">JMU</span></div>
      </div>
      <div class="prop-row">
        <div class="prop-label">Status</div>
        <div class="prop-value"><span class="inline-badge status">Aktiv</span></div>
      </div>
      <div class="prop-row">
        <div class="prop-label">Beratung</div>
        <div class="prop-value" style="color: var(--accent); font-weight: 600;">KS</div>
      </div>
      <div class="prop-row">
        <div class="prop-label">Odoo</div>
        <div class="prop-value"><a class="prop-link" href="#">Profil offnen &nearr;</a></div>
      </div>
    </div>

    <div class="sep"></div>

    <!-- ── ACTIONS ── -->
    <div class="action-section">
      <div class="section-label">Aktionen</div>
      <button class="action-row">
        <div class="action-icon">&#128193;</div>
        <div class="action-text">Ordner offnen</div>
        <div class="action-arrow">&rsaquo;</div>
      </button>
      <button class="action-row">
        <div class="action-icon">&#128196;</div>
        <div class="action-text">Akte offnen</div>
        <div class="action-arrow">&rsaquo;</div>
      </button>
      <button class="action-row">
        <div class="action-icon">BU</div>
        <div class="action-text">Beurteilung</div>
        <div class="action-arrow">&rsaquo;</div>
      </button>
      <button class="action-row">
        <div class="action-icon">BI</div>
        <div class="action-text">Bildungsbericht</div>
        <div class="action-arrow">&rsaquo;</div>
      </button>
      <button class="action-row">
        <div class="action-icon">BE</div>
        <div class="action-text">Beurteilung extern</div>
        <div class="action-arrow">&rsaquo;</div>
      </button>
      <button class="action-row">
        <div class="action-icon">LB</div>
        <div class="action-text">Laufbahnblatt</div>
        <div class="action-arrow">&rsaquo;</div>
      </button>
      <button class="action-row">
        <div class="action-icon" style="font-size:9px">E BU</div>
        <div class="action-text">Eintrag BU</div>
        <div class="action-arrow">&rsaquo;</div>
      </button>
      <button class="action-row">
        <div class="action-icon" style="font-size:9px">E BI</div>
        <div class="action-text">Eintrag BI</div>
        <div class="action-arrow">&rsaquo;</div>
      </button>
    </div>

    <div class="sep"></div>

    <!-- ── SCHEDULE (horizontal rows per day) ── -->
    <div class="schedule-section">
      <div class="section-label">Wochenplan</div>
      <div class="schedule-matrix">
        <div class="row">
          <div class="day-label">Mo</div>
          <div class="halfday has-content">
            <div class="halfday-label">VM</div>
            <span class="cell-group">BI</span>
            <span class="cell-sub">HM · 203</span>
          </div>
          <div class="halfday">
            <div class="halfday-label">NM</div>
            <span class="cell-empty">-</span>
          </div>
        </div>
        <div class="row">
          <div class="day-label">Di</div>
          <div class="halfday has-content">
            <div class="halfday-label">VM</div>
            <span class="cell-group">MO</span>
            <span class="cell-sub">KS · 105</span>
          </div>
          <div class="halfday has-content">
            <div class="halfday-label">NM</div>
            <span class="cell-group">BU</span>
            <span class="cell-sub">RS · 107</span>
          </div>
        </div>
        <div class="row">
          <div class="day-label">Mi</div>
          <div class="halfday has-content">
            <div class="halfday-label">VM</div>
            <span class="cell-group">DAZ</span>
            <span class="cell-daz">+DAZ</span>
          </div>
          <div class="halfday">
            <div class="halfday-label">NM</div>
            <span class="cell-empty">-</span>
          </div>
        </div>
        <div class="row">
          <div class="day-label">Do</div>
          <div class="halfday">
            <div class="halfday-label">VM</div>
            <span class="cell-status ext">ext</span>
          </div>
          <div class="halfday has-content">
            <div class="halfday-label">NM</div>
            <span class="cell-group">LB</span>
            <span class="cell-sub">AP · 210</span>
          </div>
        </div>
        <div class="row">
          <div class="day-label">Fr</div>
          <div class="halfday has-content">
            <div class="halfday-label">VM</div>
            <span class="cell-group">BE</span>
            <span class="cell-sub">FL · W01</span>
          </div>
          <div class="halfday">
            <div class="halfday-label">NM</div>
            <span class="cell-status disp">disp</span>
          </div>
        </div>
      </div>
    </div>

  </div>

<script>
function toggle() {
  document.documentElement.classList.toggle('light');
}
</script>
</body>
</html>
